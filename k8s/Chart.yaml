apiVersion: v2
name: backend-stack
description: |
  Kubernetes umbrella chart for the backend-utils services. Pulls the upstream
  Helm charts as dependencies: kube-prometheus-stack (Prometheus + Grafana +
  Alertmanager + node-exporter), Loki, Promtail, Tempo, OpenTelemetry Collector,
  PostgreSQL, Valkey, NATS, MinIO. Configured to mirror the docker-compose stack.
type: application
version: 0.1.0
appVersion: "1.0.0"

# Pin every dependency to a concrete chart version for reproducibility.
# `helm dependency update k8s/` resolves these into charts/.
dependencies:
  # --- Observability (one release covers prom + grafana + alertmanager + node-exporter) ---
  - name: kube-prometheus-stack
    version: "87.10.1"
    repository: https://prometheus-community.github.io/helm-charts
    condition: observability.enabled

  - name: loki
    version: "7.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled

  - name: promtail
    version: "6.17.1"
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled

  - name: tempo
    version: "1.24.4"
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled

  - name: opentelemetry-collector
    version: "0.162.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: otelCollector.enabled

  # --- Data ---
  - name: postgresql
    version: "18.7.11"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: valkey
    version: "9.1.0"
    repository: https://charts.bitnami.com/bitnami
    condition: valkey.enabled

  - name: nats
    version: "2.14.2"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled

  - name: minio
    version: "17.0.21"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
