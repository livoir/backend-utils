# NATS Server Configuration File
#
# Secrets (password hashes) are injected from the environment via NATS variable
# substitution ($VAR, unquoted). The compose service passes NATS_*_PASSWORD_HASH
# from .env (gitignored). Plaintext credentials must NEVER be committed here.

# Server settings
server_name: nats-server
listen: 0.0.0.0:4222
http_port: 8222

# Logging
debug: false
trace: false
logtime: true

# JetStream configuration (persistent messaging)
jetstream {
    store_dir: "/data/jetstream"
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Client connection limits
max_connections: 1000
max_payload: 1MB

# Authentication and Authorization
accounts {
  # System account for server monitoring and management
  SYS {
    users = [
      {
        user: "admin"
        password: $NATS_ADMIN_PASSWORD_HASH
        permissions: {
          publish: {
            allow: [">"]
          }
          subscribe: {
            allow: [">"]
          }
        }
      }
    ]
  }

  # Application account for regular services
  APP {
    users = [
      {
        user: "backend-service"
        password: $NATS_BACKEND_PASSWORD_HASH
        permissions: {
          publish: {
            allow: ["events.>", "commands.>", "requests.>", "logs.>"]
            deny: ["system.>", "admin.>"]
          }
          subscribe: {
            allow: ["events.>", "responses.>", "notifications.>", "commands.>"]
            deny: ["system.>", "admin.>"]
          }
        }
      },
      {
        user: "web-service"
        password: $NATS_WEB_PASSWORD_HASH
        permissions: {
          publish: {
            allow: ["requests.>", "user.actions.>", "notifications.>"]
            deny: ["system.>", "admin.>", "commands.>", "events.internal.>"]
          }
          subscribe: {
            allow: ["responses.>", "notifications.user.>", "events.user.>"]
            deny: ["system.>", "admin.>", "events.internal.>"]
          }
        }
      },
      {
        user: "analytics-service"
        password: $NATS_ANALYTICS_PASSWORD_HASH
        permissions: {
          publish: {
            allow: ["analytics.>", "metrics.>"]
            deny: ["system.>", "admin.>"]
          }
          subscribe: {
            allow: ["events.>", "user.>", "logs.>"]
            deny: ["system.>", "admin.>", "commands.>"]
          }
        }
      }
    ]
    jetstream: enabled
  }
}

# Cluster configuration (for multi-node setup)
# cluster {
#     name: nats-cluster
#     listen: 0.0.0.0:6222
# }

# System account for monitoring
system_account: "SYS"

# Max pending data per client
max_pending: 64MB

# Slow consumer settings
write_deadline: "2s"
