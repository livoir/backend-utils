name: backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-security: &no-new-privs
  - no-new-privileges:true

networks:
  reverse-proxy:
    name: reverse-proxy
  observability:
    name: observability
  backend-api:
    name: backend-api
  storage:
    name: storage

services:
  postgres:
    image: ${PG_IMAGE}
    container_name: postgres
    networks:
      - backend-api
      - observability
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    security_opt: *no-new-privs
    environment:
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_USER=${PG_USER}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - "./database/postgres/data:/var/lib/postgresql/data"
    ports:
      - "5432:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${CACHE_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - ./database/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    security_opt: *no-new-privs
    ports:
      - "6379:6379"
    networks:
      - backend-api
    environment:
      - CACHE_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$CACHE_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.24
    container_name: nginx
    volumes:
      - "./reverse-proxy/nginx:/etc/nginx/conf.d/"
    ports:
      - "80:80"
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    security_opt: *no-new-privs
    networks:
      - reverse-proxy

  otel-collector:
    networks:
      - observability
      - backend-api
    image: otel/opentelemetry-collector-contrib:0.155.0
    container_name: otel-collector
    volumes:
      - "./observability/otel-collector/otel-collector-config.yml:/etc/otelcol/otel-collector-collector-config.yml"
    command: --config /etc/otelcol/otel-collector-collector-config.yml
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    security_opt: *no-new-privs
    ports:
      - "14278:14278"
      - "8889:8889"
      - "4317:4317"

  prometheus:
    networks:
      - observability
      - reverse-proxy
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 2g
    security_opt: *no-new-privs
    volumes:
      - "./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "./observability/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml"
    ports:
      - "9090:9090"

  grafana:
    networks:
      - observability
      - reverse-proxy
    image: grafana/grafana:10.0.1
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    security_opt: *no-new-privs
    volumes:
      - "./observability/grafana:/var/lib/grafana"
    ports:
      - "3000:3000"

  postgres-exporter:
    networks:
      - observability
    image: prometheuscommunity/postgres-exporter:v0.12.1
    container_name: postgresql-exporter
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    security_opt: *no-new-privs
    environment:
      - DATA_SOURCE_NAME=${PG_EXPORTER_DATA_SOURCE}
    env_file:
      - .env

  loki:
    networks:
      - observability
    image: grafana/loki:3.7.3
    container_name: loki
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    security_opt: *no-new-privs

  promtail:
    networks:
      - observability
    image: grafana/promtail:3.6.11
    container_name: promtail
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    security_opt: *no-new-privs
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
    env_file:
      - .env

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node_exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    security_opt: *no-new-privs
    networks:
      - observability
    volumes:
      - /proc:/host/proc
      - /sys:/host/sys
      - /:/rootfs

  alert-manager:
    image: prom/alertmanager:v0.33.1
    container_name: alert-manager
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    security_opt: *no-new-privs
    networks:
      - observability
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  google-pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    security_opt: *no-new-privs

  keydb:
    image: ${KEYDB_IMAGE}
    container_name: keydb
    command:
      - keydb-server
      - /etc/keydb/keydb.conf
      - --requirepass
      - ${CACHE_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - ./database/keydb/keydb.conf:/etc/keydb/keydb.conf
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    security_opt: *no-new-privs
    ports:
      - "6379:6379"
    networks:
      - backend-api
    environment:
      - CACHE_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "keydb-cli -a $$CACHE_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: ${VALKEY_IMAGE}
    container_name: valkey
    command:
      - valkey-server
      - /usr/local/etc/valkey/valkey.conf
      - --requirepass
      - ${CACHE_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - ./database/valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    security_opt: *no-new-privs
    ports:
      - "6379:6379"
    networks:
      - backend-api
    environment:
      - CACHE_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a $$CACHE_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  tempo:
    image: ${GRAFANA_TEMPO_IMAGE}
    command: [--config.file=/etc/tempo/config.yaml]
    container_name: tempo
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml
      - ./observability/tempo/data:/tmp/tempo
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    security_opt: *no-new-privs
    networks:
      - observability
    ports:
      - "3200:3200" # Tempo UI/API
      # OTLP receivers (4317/4318) stay container-internal: otel-collector forwards
      # traces to tempo over the observability network. Publishing them would also
      # collide with otel-collector's host port 4317.

  minio:
    image: ${MINIO_IMAGE}
    container_name: minio
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    security_opt: *no-new-privs
    networks:
      - storage
    volumes:
      - ./storage/minio/data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    env_file:
      - .env

  nats:
    image: ${NATS_IMAGE}
    container_name: nats
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 2g
    security_opt: *no-new-privs
    networks:
      - backend-api
      - observability
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster connections
    command: 
      - "--config"
      - "/etc/nats/nats-server.conf"
    volumes:
      - ./pubsub/nats/nats-server.conf:/etc/nats/nats-server.conf
      - nats-data:/data
    environment:
      - NATS_ADMIN_USER=${NATS_ADMIN_USER}
      - NATS_ADMIN_PASSWORD_HASH=${NATS_ADMIN_PASSWORD_HASH}
      - NATS_BACKEND_USER=${NATS_BACKEND_USER}
      - NATS_BACKEND_PASSWORD_HASH=${NATS_BACKEND_PASSWORD_HASH}
      - NATS_WEB_USER=${NATS_WEB_USER}
      - NATS_WEB_PASSWORD_HASH=${NATS_WEB_PASSWORD_HASH}
      - NATS_ANALYTICS_USER=${NATS_ANALYTICS_USER}
      - NATS_ANALYTICS_PASSWORD_HASH=${NATS_ANALYTICS_PASSWORD_HASH}
      - NATS_CLUSTER_USER=${NATS_CLUSTER_USER}
      - NATS_CLUSTER_PASSWORD=${NATS_CLUSTER_PASSWORD}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  nats-data:
    driver: local
